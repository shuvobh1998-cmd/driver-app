name: CI

on:
  push:
    branches: ['**']
  pull_request:

env:
  FLUTTER_VERSION: '3.44.1'

jobs:
  analyze-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Codegen (models + build_runner + l10n)
        run: |
          dart run swagger_parser
          dart run build_runner build --delete-conflicting-outputs
          flutter gen-l10n
          dart format lib/gen lib/l10n/gen

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  build-apk:
    name: Build debug APK (dev)
    runs-on: ubuntu-latest
    needs: analyze-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Codegen
        run: |
          dart run swagger_parser
          dart run build_runner build --delete-conflicting-outputs
          flutter gen-l10n
          dart format lib/gen lib/l10n/gen

      - name: Build dev debug APK
        run: flutter build apk --debug --flavor dev -t lib/main_dev.dart

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-dev-debug
          path: build/app/outputs/flutter-apk/app-dev-debug.apk
          if-no-files-found: error
