# Static analysis config. `flutter analyze` must be clean for CI to pass.
include: package:flutter_lints/flutter.yaml

analyzer:
  # Generated code is excluded from analysis; the toolchain regenerates it.
  exclude:
    - "lib/gen/**"
    - "lib/l10n/gen/**"
    - "**/*.g.dart"
    - "**/*.freezed.dart"
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # Treat these as hard errors — they catch real bugs in this codebase.
    avoid_relative_lib_imports: error
    missing_required_param: error
    missing_return: error

linter:
  rules:
    # Money/state correctness + readability rules for this project.
    - prefer_single_quotes
    - require_trailing_commas
    - avoid_print
    - prefer_const_constructors
    - prefer_final_locals
    - unawaited_futures
    - use_super_parameters
    - sort_child_properties_last
    - directives_ordering
